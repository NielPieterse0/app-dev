name: app-dev validation

concurrency:
  group: app-dev-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover-apps:
    name: Discover app projects
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Build app matrix
        id: discover
        shell: bash
        run: |
          matrix="$(node ./scripts/get-app-validation-matrix.mjs)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  workspace-validation:
    name: Workspace validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup PowerShell module cache
        shell: pwsh
        run: |
          $moduleCache = Join-Path $HOME ".local/share/powershell/Modules"
          "PSMODULECACHE=$moduleCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache PSScriptAnalyzer
        uses: actions/cache@v4
        with:
          path: ${{ env.PSMODULECACHE }}
          key: ${{ runner.os }}-psscriptanalyzer-v1

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
          }

      - name: Show tool versions
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          git --version
          node --version
          npm --version
          python --version

      - name: Run portability lint
        shell: pwsh
        run: ./scripts/lint-portability.ps1

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path ./scripts,./.codex/hooks -Settings ./scripts/PSScriptAnalyzerSettings.psd1 -Severity Error

      - name: Run canonical governance check
        shell: pwsh
        run: ./scripts/check-all.ps1

  app-validation:
    needs: discover-apps
    name: App validation (${{ matrix.project.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-apps.outputs.matrix) }}

    defaults:
      run:
        working-directory: ${{ matrix.project.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: ${{ matrix.project.path }}/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles(format('{0}/package-lock.json', matrix.project.path)) }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Check spec artifacts
        shell: pwsh
        run: ../../scripts/check-spec-artifacts.ps1 -ProjectPath .

      - name: Analyze spec artifacts
        shell: pwsh
        run: ../../scripts/analyze-spec.ps1 -ProjectPath .

      - name: Validate workflow receipts
        shell: pwsh
        run: ../../scripts/validate-workflow-receipts.ps1 -ProjectPath . -RequireVerificationEvidence

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E
        run: npm run e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-playwright-artifacts
          path: |
            ${{ matrix.project.path }}/playwright-report
            ${{ matrix.project.path }}/test-results
          if-no-files-found: ignore

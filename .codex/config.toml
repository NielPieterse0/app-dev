# Project-level Codex configuration for app-dev.
# User/global settings belong in C:\Users\piete\.codex\config.toml.
# Windows sandbox mode belongs in global config, not here.

project_doc_max_bytes = 65536

[features]
hooks = true

# Leave default_permissions disabled until the Windows runner is stable.
# If you re-enable it later, include the parent [permissions.app-dev-workspace]
# table and set default_permissions = "app-dev-workspace".
#
# default_permissions = "app-dev-workspace"

# Hooks: keep inline here. Do not also use .codex/hooks.json in this layer.

[[hooks.PreToolUse]]
matcher = "^Bash$|^apply_patch$|^Edit$|^Write$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'pwsh -NoProfile -ExecutionPolicy Bypass -File "$(git rev-parse --show-toplevel)/.codex/hooks/pre-command.ps1"'
command_windows = "pwsh -NoProfile -ExecutionPolicy Bypass -Command \"$repo = git rev-parse --show-toplevel; & (Join-Path $repo '.codex/hooks/pre-command.ps1')\""
timeout = 30
statusMessage = "Checking app-dev command policy"

[[hooks.PermissionRequest]]
matcher = "^Bash$|^apply_patch$|^Edit$|^Write$"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = 'pwsh -NoProfile -ExecutionPolicy Bypass -File "$(git rev-parse --show-toplevel)/.codex/hooks/pre-command.ps1"'
command_windows = "pwsh -NoProfile -ExecutionPolicy Bypass -Command \"$repo = git rev-parse --show-toplevel; & (Join-Path $repo '.codex/hooks/pre-command.ps1')\""
timeout = 30
statusMessage = "Checking app-dev approval request"

[[hooks.PostToolUse]]
matcher = "^Bash$|^apply_patch$|^Edit$|^Write$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'pwsh -NoProfile -ExecutionPolicy Bypass -File "$(git rev-parse --show-toplevel)/.codex/hooks/post-edit.ps1"'
command_windows = "pwsh -NoProfile -ExecutionPolicy Bypass -Command \"$repo = git rev-parse --show-toplevel; & (Join-Path $repo '.codex/hooks/post-edit.ps1')\""
timeout = 30
statusMessage = "Reviewing app-dev verification hints"
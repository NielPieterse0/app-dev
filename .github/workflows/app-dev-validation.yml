name: app-dev validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace-validation:
    name: Workspace validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show tool versions
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          git --version
          node --version
          npm --version
          python --version

      - name: Check workspace structure
        shell: pwsh
        run: ./scripts/check-workspace.ps1

      - name: Validate Codex assets
        shell: pwsh
        run: ./scripts/validate-codex-assets.ps1 -RequirePythonToml $true

      - name: Test hook policy
        shell: pwsh
        run: ./scripts/test-hooks.ps1

      - name: Test workflow enforcement
        shell: pwsh
        run: ./scripts/test-workflow-enforcement.ps1

      - name: Test spec analysis
        shell: pwsh
        run: ./scripts/test-analyze-spec.ps1

      - name: Analyze Signal spec artifacts
        shell: pwsh
        run: ./scripts/analyze-spec.ps1 -ProjectPath projects/signal

      - name: Scan for secrets
        shell: pwsh
        run: ./scripts/scan-secrets.ps1

      - name: Test project generation
        shell: pwsh
        run: ./scripts/test-workspace.ps1

  app-validation:
    name: App validation (${{ matrix.project.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: Signal
            path: projects/signal

    defaults:
      run:
        working-directory: ${{ matrix.project.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E
        run: npm run e2e
